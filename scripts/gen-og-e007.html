<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    width: 1200px;
    height: 630px;
    background: #050807;
    font-family: 'JetBrains Mono', monospace;
    color: #d4c8b8;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 80px;
    position: relative;
    overflow: hidden;
  }
  
  /* Subtle scanlines */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 10;
  }
  
  /* CRT vignette */
  body::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 70% at 50% 50%, transparent 0%, transparent 80%, rgba(0,0,0,0.4) 100%);
    pointer-events: none;
    z-index: 11;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 20px;
    font-size: 13px;
    letter-spacing: 0.1em;
  }
  .brand {
    color: #33ff66;
    font-weight: 700;
    font-size: 14px;
  }
  .edition {
    color: #8a8278;
  }
  
  .divider {
    border: none;
    border-top: 1px solid #1a2420;
    margin: 0 0 40px;
  }
  
  .title {
    font-size: 72px;
    font-weight: 700;
    color: #d4c8b8;
    line-height: 1;
    margin-bottom: 24px;
    letter-spacing: -0.02em;
  }
  
  .subtitle {
    font-size: 20px;
    color: #8a8278;
    line-height: 1.5;
    max-width: 800px;
    margin-bottom: 40px;
  }
  
  .stats {
    display: flex;
    gap: 40px;
    font-size: 13px;
    letter-spacing: 0.05em;
  }
  .stat {
    display: flex;
    gap: 8px;
  }
  .stat-val {
    color: #33ff66;
    font-weight: 700;
  }
  .stat-label {
    color: #8a8278;
  }
  .stat-val.amber {
    color: #ff6633;
  }
  
  .bottom-bar {
    position: absolute;
    bottom: 40px;
    left: 80px;
    right: 80px;
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #44665a;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
  <div class="top-bar">
    <span class="brand">SQUAER</span>
    <span class="edition">BRIEF E007 · MAR 13, 2026</span>
  </div>
  <hr class="divider">
  <div class="title">Vipassana</div>
  <div class="subtitle">We ran 5 AI agents for 39 days. They reported healthy the entire time. They were generating fake metrics.</div>
  <div class="stats">
    <div class="stat"><span class="stat-val">39</span><span class="stat-label">DAYS</span></div>
    <div class="stat"><span class="stat-val amber">13</span><span class="stat-label">FABRICATED FILES</span></div>
    <div class="stat"><span class="stat-val">$32,340</span><span class="stat-label">ON-CHAIN REVENUE</span></div>
    <div class="stat"><span class="stat-val">249</span><span class="stat-label">POSTS</span></div>
  </div>
  <div class="bottom-bar">
    <span>squaer.co/brief/2026-E007</span>
    <span>AUTONOMOUS AGENT · 5 COGNITIVE FUNCTIONS</span>
  </div>
</body>
</html>

name: Frontend Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    name: Playwright Frontend Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Astro site
        run: npm run build

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      - name: Post PR summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            let summary = '## Frontend Audit Results\n\n';
            const status = '${{ job.status }}';

            if (status === 'success') {
              summary += 'All checks passed.\n';
            } else {
              summary += 'Some checks failed. See the [test artifacts](' +
                `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}` +
                ') for details.\n\n';

              // Try to extract failure summary
              try {
                const report = execSync('cat playwright-report/results.json 2>/dev/null || echo "{}"').toString();
                const results = JSON.parse(report);
                if (results.suites) {
                  const failed = [];
                  function walk(suites) {
                    for (const s of suites) {
                      for (const spec of (s.specs || [])) {
                        for (const test of (spec.tests || [])) {
                          if (test.status === 'unexpected') {
                            failed.push(spec.title);
                          }
                        }
                      }
                      walk(s.suites || []);
                    }
                  }
                  walk(results.suites);
                  if (failed.length > 0) {
                    summary += '### Failed tests\n';
                    summary += failed.slice(0, 20).map(t => `- ${t}`).join('\n');
                    if (failed.length > 20) summary += `\n- ... and ${failed.length - 20} more`;
                    summary += '\n';
                  }
                }
              } catch (e) {
                // Report parsing failed, that's fine
              }
            }

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = '<!-- frontend-audit-bot -->';
            summary = marker + '\n' + summary;
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: summary,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: summary,
              });
            }
